<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RX-07 · Phòng điều khiển Robot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080b12;
    --bg2:#0d1420;
    --panel:#111927;
    --panel2:#0c1219;
    --border:#1f2c3d;
    --cyan:#4fe0e8;
    --cyan-dim:#1c5a63;
    --amber:#f5a623;
    --magenta:#ff5c7a;
    --text:#dbe6ef;
    --text-dim:#6f8598;
    --metal:#b6c0cc;
    --metal-dk:#4d5866;
    --metal-dker:#2a3138;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:hidden;}
  body{
    background:
      radial-gradient(ellipse at 50% -10%, #14202f 0%, transparent 60%),
      linear-gradient(180deg,var(--bg) 0%, #05070b 100%);
    display:flex; flex-direction:column; height:100vh;
  }
  .titlebar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 20px; border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,#0e1520,#0a0f17);
    flex:0 0 auto;
  }
  .titlebar h1{
    font-family:'Orbitron',sans-serif; font-size:16px; letter-spacing:3px;
    margin:0; color:var(--cyan); text-shadow:0 0 12px rgba(79,224,232,.5);
    font-weight:700;
  }
  .titlebar .sub{font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text-dim); letter-spacing:1px;}
  .statusline{display:flex; gap:18px; align-items:center;}
  .statusline .dot{width:8px;height:8px;border-radius:50%;background:var(--amber);display:inline-block;margin-right:6px;box-shadow:0 0 8px var(--amber);animation:pulse 2s infinite;}
  .statusline .item{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  .main{flex:1 1 auto; display:flex; min-height:0;}
  .stage-wrap{flex:1 1 65%; position:relative; min-width:0; border-right:1px solid var(--border);}
  #stage{width:100%; height:100%; display:block;}

  .console{
    flex:0 0 360px; display:flex; flex-direction:column;
    background:var(--panel2); min-width:300px;
  }
  @media (max-width: 860px){
    .main{flex-direction:column;}
    .stage-wrap{flex:1 1 50%; border-right:none; border-bottom:1px solid var(--border);}
    .console{flex:1 1 50%; min-width:0;}
  }

  .panel-section{padding:14px 16px; border-bottom:1px solid var(--border);}
  .panel-label{font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:2px; color:var(--text-dim); margin:0 0 10px 0;}
  .panel-label b{color:var(--cyan);}

  .quickgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .qbtn{
    background:linear-gradient(180deg,#182233,#0f1621);
    border:1px solid var(--border); color:var(--text);
    font-family:'Rajdhani',sans-serif; font-weight:600; font-size:13px;
    letter-spacing:.5px; padding:9px 4px; border-radius:4px; cursor:pointer;
    transition:all .15s ease;
  }
  .qbtn:hover{border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 10px rgba(79,224,232,.25); transform:translateY(-1px);}
  .qbtn:active{transform:translateY(0px) scale(.97);}
  .qbtn.stop{grid-column:span 3; border-color:var(--magenta); color:var(--magenta);}
  .qbtn.stop:hover{box-shadow:0 0 10px rgba(255,92,122,.3);}

  .terminal{
    flex:1 1 auto; min-height:0; overflow-y:auto; padding:12px 16px;
    font-family:'Share Tech Mono',monospace; font-size:12.5px; line-height:1.6;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
  }
  .terminal .line{margin-bottom:4px; word-wrap:break-word;}
  .terminal .t-sys{color:var(--text-dim);}
  .terminal .t-user{color:var(--amber);}
  .terminal .t-user::before{content:"› "; color:var(--amber);}
  .terminal .t-ok{color:var(--cyan);}
  .terminal .t-err{color:var(--magenta);}

  .inputrow{display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--border); background:var(--panel);}
  #cmdInput{
    flex:1 1 auto; background:#0a1017; border:1px solid var(--border); border-radius:4px;
    color:var(--text); font-family:'Share Tech Mono',monospace; font-size:13px;
    padding:9px 10px; outline:none;
  }
  #cmdInput:focus{border-color:var(--cyan); box-shadow:0 0 0 1px var(--cyan) inset;}
  #cmdInput::placeholder{color:var(--text-dim);}
  .iconbtn{
    width:40px; height:40px; flex:0 0 auto; border-radius:4px; border:1px solid var(--border);
    background:#0f1621; color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .15s ease;
  }
  .iconbtn:hover{border-color:var(--cyan); color:var(--cyan);}
  .iconbtn.mic.listening{
    background:var(--magenta); border-color:var(--magenta); color:#1a0a0e;
    box-shadow:0 0 14px rgba(255,92,122,.6); animation:mic-pulse 1s infinite;
  }
  @keyframes mic-pulse{0%,100%{box-shadow:0 0 6px rgba(255,92,122,.5);}50%{box-shadow:0 0 20px rgba(255,92,122,.85);}}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}

  .no-speech-note{font-size:11px; color:var(--text-dim); padding:4px 16px 10px; font-family:'Share Tech Mono',monospace;}
</style>
</head>
<body>

<div class="titlebar">
  <div>
    <h1>RX‑07 · CONTROL DECK</h1>
    <div class="sub">MÔ PHỎNG PHÒNG ĐIỀU KHIỂN ROBOT — SVG THUẦN</div>
  </div>
  <div class="statusline">
    <span class="item"><span class="dot"></span>HỆ THỐNG: TRỰC TUYẾN</span>
    <span class="item" id="modeReadout">CHẾ ĐỘ: CHỜ LỆNH</span>
    <span class="item" id="clockReadout">00:00:00</span>
  </div>
</div>

<div class="main">
  <div class="stage-wrap">
    <svg id="stage" viewBox="0 0 1000 620" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <div class="console">
    <div class="panel-section">
      <p class="panel-label">LỆNH NHANH · <b>QUICK ACTIONS</b></p>
      <div class="quickgrid">
        <button class="qbtn" data-cmd="đi tới">Tiến</button>
        <button class="qbtn" data-cmd="đi lui">Lùi</button>
        <button class="qbtn" data-cmd="quay người">Quay</button>
        <button class="qbtn" data-cmd="nhảy">Nhảy</button>
        <button class="qbtn" data-cmd="nhào lộn">Nhào lộn</button>
        <button class="qbtn" data-cmd="vẫy tay">Vẫy tay</button>
        <button class="qbtn" data-cmd="ngồi xuống">Ngồi</button>
        <button class="qbtn" data-cmd="đứng dậy">Đứng</button>
        <button class="qbtn" data-cmd="giơ tay">Giơ tay</button>
        <button class="qbtn stop" data-cmd="dừng lại">⏹ DỪNG KHẨN CẤP</button>
      </div>
    </div>

    <div class="panel-section" style="border-bottom:none; flex:1 1 auto; display:flex; flex-direction:column; min-height:0; padding-bottom:0;">
      <p class="panel-label">NHẬT KÝ · <b>LOG</b></p>
      <div class="terminal" id="terminal"></div>
    </div>

    <div class="inputrow">
      <input type="text" id="cmdInput" placeholder="Gõ lệnh, ví dụ: đi tới 3 bước..." autocomplete="off">
      <button class="iconbtn mic" id="micBtn" title="Điều khiển bằng giọng nói">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 003-3V6a3 3 0 10-6 0v6a3 3 0 003 3z" stroke="currentColor" stroke-width="2"/><path d="M19 11a7 7 0 01-14 0M12 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="iconbtn" id="sendBtn" title="Gửi lệnh">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 12l16-7-6 16-2.5-6.5L4 12z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="no-speech-note" id="speechNote"></div>
  </div>
</div>

<script>
const SVGNS = "http://www.w3.org/2000/svg";
const stage = document.getElementById('stage');

function el(tag, attrs, parent){
  const e = document.createElementNS(SVGNS, tag);
  for(const k in attrs) e.setAttribute(k, attrs[k]);
  if(parent) parent.appendChild(e);
  return e;
}

/* ---------- DEFS (gradients / filters) ---------- */
const defs = el('defs', {}, stage);

const wallGrad = el('linearGradient', {id:'wallGrad', x1:'0', y1:'0', x2:'0', y2:'1'}, defs);
el('stop', {offset:'0%', 'stop-color':'#111a29'}, wallGrad);
el('stop', {offset:'100%', 'stop-color':'#0a0f18'}, wallGrad);

const floorGrad = el('linearGradient', {id:'floorGrad', x1:'0', y1:'0', x2:'0', y2:'1'}, defs);
el('stop', {offset:'0%', 'stop-color':'#0e1521'}, floorGrad);
el('stop', {offset:'100%', 'stop-color':'#050810'}, floorGrad);

const screenGrad = el('radialGradient', {id:'screenGrad', cx:'50%', cy:'40%', r:'75%'}, defs);
el('stop', {offset:'0%', 'stop-color':'#123047'}, screenGrad);
el('stop', {offset:'100%', 'stop-color':'#050d14'}, screenGrad);

const metalGrad = el('linearGradient', {id:'metalGrad', x1:'0', y1:'0', x2:'1', y2:'0'}, defs);
el('stop', {offset:'0%', 'stop-color':'#7c8794'}, metalGrad);
el('stop', {offset:'50%', 'stop-color':'#c9d2db'}, metalGrad);
el('stop', {offset:'100%', 'stop-color':'#6b7681'}, metalGrad);

const glow = el('filter', {id:'glow', x:'-60%', y:'-60%', width:'220%', height:'220%'}, defs);
el('feGaussianBlur', {stdDeviation:'3', result:'blur'}, glow);
const merge = el('feMerge', {}, glow);
el('feMergeNode', {in:'blur'}, merge);
el('feMergeNode', {in:'SourceGraphic'}, merge);

/* ---------- ROOM ---------- */
el('rect', {x:0,y:0,width:1000,height:430, fill:'url(#wallGrad)'}, stage);
el('rect', {x:0,y:430,width:1000,height:190, fill:'url(#floorGrad)'}, stage);

// perspective floor grid converging to vanishing point (500,300)
const floorGroup = el('g', {opacity:0.55}, stage);
const VPX=500, VPY=300;
for(let i=-6;i<=6;i++){
  const bx = 500 + i*160;
  el('line', {x1:VPX, y1:VPY, x2:bx, y2:620, stroke:'#1c2c40', 'stroke-width':1}, floorGroup);
}
for(let j=0;j<6;j++){
  const t = j/5;
  const y = 430 + t*t*190;
  el('line', {x1: VPX-(VPX-40)*(1-t), y1:y, x2: VPX+(960-VPX)*(1-t), y2:y, stroke:'#1c2c40', 'stroke-width':1}, floorGroup);
}

// wall screens
function wallScreen(x,y,w,h){
  const g = el('g', {}, stage);
  el('rect', {x:x-4,y:y-4,width:w+8,height:h+8, rx:6, fill:'#050a10', stroke:'#233246'}, g);
  el('rect', {x, y, width:w, height:h, rx:3, fill:'url(#screenGrad)'}, g);
  return g;
}
const scr1 = wallScreen(60,60,230,140);
const scr2 = wallScreen(710,60,230,140);
const scr3 = wallScreen(385,50,230,110);

// radar sweep in screen 1
const radarCx=175, radarCy=130, radarR=58;
el('circle', {cx:radarCx,cy:radarCy,r:radarR, fill:'none', stroke:'#1d4a56', 'stroke-width':1}, scr1);
el('circle', {cx:radarCx,cy:radarCy,r:radarR*0.66, fill:'none', stroke:'#1d4a56', 'stroke-width':1}, scr1);
el('circle', {cx:radarCx,cy:radarCy,r:radarR*0.33, fill:'none', stroke:'#1d4a56', 'stroke-width':1}, scr1);
const radarSweep = el('line', {x1:radarCx,y1:radarCy,x2:radarCx+radarR,y2:radarCy, stroke:'#4fe0e8','stroke-width':2, opacity:0.8, filter:'url(#glow)'}, scr1);

// bar chart in screen 2
const barsG = el('g', {}, scr2);
const bars = [];
for(let i=0;i<9;i++){
  const b = el('rect', {x: 825+i*24, y:150, width:14, height:10, fill:'#4fe0e8', opacity:0.75}, barsG);
  bars.push(b);
}

// scanning line in screen 3
const scanLine = el('line', {x1:385,y1:50,x2:385,y2:160, stroke:'#f5a623', 'stroke-width':2, opacity:0.75, filter:'url(#glow)'}, scr3);
for(let i=0;i<4;i++){
  el('line', {x1:395, y1:70+i*20, x2:600, y2:70+i*20, stroke:'#274257', 'stroke-width':4}, scr3);
}

// robot platform
el('ellipse', {cx:500, cy:520, rx:150, ry:26, fill:'#0a1420', stroke:'#233246', 'stroke-width':2}, stage);
el('ellipse', {cx:500, cy:516, rx:135, ry:20, fill:'none', stroke:'#4fe0e8', 'stroke-width':1, opacity:0.35}, stage);

/* ---------- ROBOT ---------- */
const GROUND_Y = 500; // hip baseline y when standing
const robotGrp = el('g', {id:'robotGrp'}, stage);

function limb(parent, w, h, rx, roundTop){
  return el('rect', {x:-w/2, y:0, width:w, height:h, rx:rx, fill:'url(#metalGrad)', stroke:'#333d47', 'stroke-width':1}, parent);
}
function jointDot(parent, cy){
  return el('circle', {cx:0, cy: cy||0, r:5, fill:'#0d1a22', stroke:'#4fe0e8', 'stroke-width':1.5, filter:'url(#glow)'}, parent);
}

// TORSO
const torsoGrp = el('g', {id:'torsoGrp'}, robotGrp);
el('rect', {x:-19, y:-88, width:38, height:90, rx:10, fill:'url(#metalGrad)', stroke:'#333d47'}, torsoGrp);
el('rect', {x:-8, y:-70, width:16, height:16, rx:3, fill:'#0d1a22', stroke:'#4fe0e8', 'stroke-width':1.2, filter:'url(#glow)'}, torsoGrp); // chest core
el('line', {x1:-14,y1:-40,x2:14,y2:-40, stroke:'#333d47', 'stroke-width':1}, torsoGrp);
el('line', {x1:-14,y1:-20,x2:14,y2:-20, stroke:'#333d47', 'stroke-width':1}, torsoGrp);
jointDot(torsoGrp, 0);

// HEAD
const headGrp = el('g', {id:'headGrp'}, torsoGrp);
headGrp.setAttribute('transform','translate(0,-88)');
el('rect', {x:-5, y:-14, width:10, height:14, fill:'url(#metalGrad)'}, headGrp); // neck
jointDot(headGrp, -14);
const headShape = el('g', {transform:'translate(0,-38)'}, headGrp);
el('circle', {cx:0, cy:0, r:22, fill:'url(#metalGrad)', stroke:'#333d47', 'stroke-width':1}, headShape);
const eyeL = el('circle', {cx:-8, cy:-2, r:3.2, fill:'#4fe0e8', filter:'url(#glow)'}, headShape);
const eyeR = el('circle', {cx:8, cy:-2, r:3.2, fill:'#4fe0e8', filter:'url(#glow)'}, headShape);
el('rect', {x:-8, y:8, width:16, height:3, rx:1.5, fill:'#233246'}, headShape);
el('rect', {x:-24, y:-6, width:6, height:10, rx:2, fill:'#333d47'}, headShape); // antenna base L
el('rect', {x:18, y:-6, width:6, height:10, rx:2, fill:'#333d47'}, headShape);
el('line', {x1:0,y1:-22, x2:0, y2:-32, stroke:'#333d47', 'stroke-width':2}, headShape);
el('circle', {cx:0, cy:-33, r:3, fill:'#f5a623', filter:'url(#glow)'}, headShape);

// ARM builder
function buildArm(sideSign){
  const shoulder = el('g', {}, torsoGrp);
  shoulder.setAttribute('transform', `translate(${sideSign*19},-78)`);
  jointDot(shoulder,0);
  limb(shoulder, 12, 44, 5);
  const elbow = el('g', {transform:'translate(0,44)'}, shoulder);
  jointDot(elbow,0);
  limb(elbow, 10, 40, 4);
  const hand = el('circle', {cx:0, cy:44, r:7, fill:'#8f99a5', stroke:'#333d47'}, elbow);
  return {shoulder, elbow};
}
const lArm = buildArm(-1);
const rArm = buildArm(1);

// LEG builder
function buildLeg(sideSign){
  const hip = el('g', {}, robotGrp);
  hip.setAttribute('transform', `translate(${sideSign*11},0)`);
  jointDot(hip,0);
  limb(hip, 15, 52, 6);
  const knee = el('g', {transform:'translate(0,52)'}, hip);
  jointDot(knee,0);
  limb(knee, 13, 46, 5);
  el('ellipse', {cx:sideSign*4, cy:48, rx:16, ry:6.5, fill:'#8f99a5', stroke:'#333d47'}, knee);
  return {hip, knee};
}
const lLeg = buildLeg(-1);
const rLeg = buildLeg(1);

/* ---------- STATE & RENDER ---------- */
const pose = {
  torso:0, head:0,
  lShoulder:6, rShoulder:-6, lElbow:6, rElbow:6,
  lHip:0, rHip:0, lKnee:0, rKnee:0
};
const position = { x:500, y:0, rot:0, dir:1 }; // y = offset from GROUND_Y (negative = up)

function render(){
  robotGrp.setAttribute('transform',
    `translate(${position.x},${GROUND_Y+position.y}) rotate(${position.rot}) scale(${position.dir},1)`);
  torsoGrp.setAttribute('transform', `rotate(${pose.torso})`);
  headGrp.setAttribute('transform', `translate(0,-88) rotate(${pose.head})`);
  lArm.shoulder.setAttribute('transform', `translate(-19,-78) rotate(${pose.lShoulder})`);
  rArm.shoulder.setAttribute('transform', `translate(19,-78) rotate(${pose.rShoulder})`);
  lArm.elbow.setAttribute('transform', `translate(0,44) rotate(${pose.lElbow})`);
  rArm.elbow.setAttribute('transform', `translate(0,44) rotate(${pose.rElbow})`);
  lLeg.hip.setAttribute('transform', `translate(-11,0) rotate(${pose.lHip})`);
  rLeg.hip.setAttribute('transform', `translate(11,0) rotate(${pose.rHip})`);
  lLeg.knee.setAttribute('transform', `translate(0,52) rotate(${pose.lKnee})`);
  rLeg.knee.setAttribute('transform', `translate(0,52) rotate(${pose.rKnee})`);
}
render();

/* ambient screen animation loop */
let ambT = 0;
function ambientLoop(){
  ambT += 0.02;
  radarSweep.setAttribute('transform', `rotate(${(ambT*60)%360} ${radarCx} ${radarCy})`);
  bars.forEach((b,i)=>{
    const h = 8 + Math.abs(Math.sin(ambT*1.3 + i*0.7))*46;
    b.setAttribute('height', h.toFixed(1));
    b.setAttribute('y', (160-h).toFixed(1));
  });
  const sx = 395 + ((ambT*140)%210);
  scanLine.setAttribute('x1', sx.toFixed(1)); scanLine.setAttribute('x2', sx.toFixed(1));
  requestAnimationFrame(ambientLoop);
}
ambientLoop();

/* ---------- ANIMATION ENGINE ---------- */
let token = 0; // incrementing token cancels older running actions
function newToken(){ token++; return token; }

function lerp(a,b,t){ return a+(b-a)*t; }

function sleep(ms, myToken){
  return new Promise(res=>{
    const t0 = performance.now();
    function step(now){
      if(myToken !== token) return res(false);
      if(now - t0 >= ms) return res(true);
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

function tweenPose(target, duration, myToken){
  return new Promise(res=>{
    const start = {}; for(const k in target) start[k] = pose[k];
    const startPos = {x:position.x, y:position.y, rot:position.rot};
    const t0 = performance.now();
    function step(now){
      if(myToken !== token) return res(false);
      const t = Math.min(1,(now-t0)/duration);
      const e = t<0.5 ? 2*t*t : -1+(4-2*t)*t; // ease in-out
      for(const k in target) pose[k] = lerp(start[k], target[k], e);
      render();
      if(t<1) requestAnimationFrame(step); else res(true);
    }
    requestAnimationFrame(step);
  });
}

const IDLE = {torso:0, head:0, lShoulder:6, rShoulder:-6, lElbow:6, rElbow:6, lHip:0, rHip:0, lKnee:0, rKnee:0};

async function walkCycle(steps, forwardSign, myToken){
  const stepDur = 420; // ms per stride
  const distPerStep = 34;
  const cycles = steps;
  for(let i=0;i<cycles;i++){
    const t0 = performance.now();
    while(true){
      if(myToken !== token) return false;
      const now = performance.now();
      const t = Math.min(1,(now-t0)/stepDur);
      const ang = t*Math.PI*2;
      pose.lHip = 26*Math.sin(ang);
      pose.rHip = -26*Math.sin(ang);
      pose.lKnee = Math.max(0, 34*Math.sin(ang+0.9))*1;
      pose.rKnee = Math.max(0, 34*Math.sin(ang+0.9+Math.PI))*1;
      pose.lShoulder = 6 + -22*Math.sin(ang);
      pose.rShoulder = -6 + 22*Math.sin(ang);
      pose.lElbow = 6 + 12*Math.max(0,Math.sin(ang));
      pose.rElbow = 6 + 12*Math.max(0,Math.sin(ang+Math.PI));
      pose.torso = 2*Math.sin(ang*2);
      position.y = -Math.abs(Math.sin(ang*2))*6;
      render();
      if(t>=1) break;
      await new Promise(r=>requestAnimationFrame(r));
    }
    position.x += forwardSign*distPerStep;
  }
  await tweenPose(IDLE, 260, myToken);
  position.y = 0; render();
  return true;
}

async function jumpAction(myToken){
  const t0 = performance.now();
  const dur = 700;
  const cx = {...pose};
  return new Promise(res=>{
    function step(now){
      if(myToken !== token) return res(false);
      const t = Math.min(1,(now-t0)/dur);
      const arc = Math.sin(t*Math.PI); // 0->1->0
      position.y = -arc*130;
      pose.lHip = -20*arc; pose.rHip = -20*arc;
      pose.lKnee = 55*arc; pose.rKnee = 55*arc;
      pose.lShoulder = 6 - 60*arc; pose.rShoulder = -6 + 60*arc;
      render();
      if(t<1) requestAnimationFrame(step);
      else { position.y=0; tweenPose(IDLE,200,myToken).then(()=>res(true)); }
    }
    requestAnimationFrame(step);
  });
}

async function backflipAction(myToken){
  const t0 = performance.now();
  const dur = 900;
  return new Promise(res=>{
    function step(now){
      if(myToken !== token) return res(false);
      const t = Math.min(1,(now-t0)/dur);
      const arc = Math.sin(t*Math.PI);
      position.y = -arc*140;
      position.rot = -360*t;
      pose.lHip = -70; pose.rHip=-70; pose.lKnee=110; pose.rKnee=110;
      pose.lShoulder = -90; pose.rShoulder = 90; pose.lElbow=40; pose.rElbow=40;
      pose.torso = -20;
      render();
      if(t<1) requestAnimationFrame(step);
      else {
        position.y=0; position.rot=0;
        tweenPose(IDLE,200,myToken).then(()=>res(true));
      }
    }
    requestAnimationFrame(step);
  });
}

async function waveAction(myToken){
  await tweenPose({...IDLE, rShoulder:-150, rElbow:10}, 300, myToken);
  if(myToken!==token) return false;
  for(let i=0;i<3;i++){
    await tweenPose({...IDLE, rShoulder:-150, rElbow:-20}, 220, myToken);
    if(myToken!==token) return false;
    await tweenPose({...IDLE, rShoulder:-150, rElbow:25}, 220, myToken);
    if(myToken!==token) return false;
  }
  await tweenPose(IDLE, 300, myToken);
  return true;
}

async function turnAction(myToken){
  const t0 = performance.now(); const dur=500;
  return new Promise(res=>{
    function step(now){
      if(myToken!==token) return res(false);
      const t = Math.min(1,(now-t0)/dur);
      position.rot = 360*t;
      render();
      if(t<1) requestAnimationFrame(step);
      else { position.rot=0; position.dir*=-1; render(); res(true); }
    }
    requestAnimationFrame(step);
  });
}

async function sitAction(myToken){
  await tweenPose({...IDLE, lHip:-85, rHip:-85, lKnee:95, rKnee:95, torso:-8, lShoulder:20, rShoulder:-20}, 420, myToken);
  return true;
}
async function standAction(myToken){
  await tweenPose(IDLE, 420, myToken);
  return true;
}
async function raiseArmsAction(myToken){
  await tweenPose({...IDLE, lShoulder:-165, rShoulder:165, lElbow:5, rElbow:5}, 420, myToken);
  return true;
}
async function stopAction(myToken){
  position.y=0; position.rot=0; await tweenPose(IDLE, 260, myToken);
  return true;
}

/* ---------- TERMINAL / LOG ---------- */
const terminal = document.getElementById('terminal');
function log(text, cls){
  const d = document.createElement('div');
  d.className = 'line ' + (cls||'t-sys');
  d.textContent = text;
  terminal.appendChild(d);
  terminal.scrollTop = terminal.scrollHeight;
}
function ts(){
  const d = new Date();
  return d.toTimeString().slice(0,8);
}
const modeReadout = document.getElementById('modeReadout');
function setMode(txt){ modeReadout.textContent = 'CHẾ ĐỘ: ' + txt; }

log('[' + ts() + '] Hệ thống RX-07 đã khởi động. Sẵn sàng nhận lệnh.', 't-ok');

/* ---------- COMMAND PARSER ---------- */
function stripAccents(s){
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}
function extractSteps(raw){
  const m = raw.match(/(\d+)/);
  return m ? Math.max(1, Math.min(10, parseInt(m[1]))) : 1;
}

async function processCommand(raw){
  const original = raw.trim();
  if(!original) return;
  log(original, 't-user');
  const s = stripAccents(original);
  const myToken = newToken();

  const rules = [
    { test:/nhao lon|lon nhao|backflip|lon vong/, label:'NHÀO LỘN', mode:'NHÀO LỘN', run: ()=>backflipAction(myToken) },
    { test:/di lui|lui lai|lui buoc|di giat lui/, label:'ĐI LÙI', mode:'ĐI LÙI', run: ()=>walkCycle(extractSteps(s), -1, myToken) },
    { test:/di toi|tien len|di thang|buoc toi|di ve phia truoc/, label:'ĐI TỚI', mode:'ĐI TỚI', run: ()=>walkCycle(extractSteps(s), 1, myToken) },
    { test:/nhay/, label:'NHẢY', mode:'NHẢY', run: ()=>jumpAction(myToken) },
    { test:/vay tay|chao|xin chao/, label:'VẪY TAY', mode:'CHÀO HỎI', run: ()=>waveAction(myToken) },
    { test:/quay nguoi|xoay nguoi|quay lai|xoay lai|^quay$/, label:'QUAY NGƯỜI', mode:'QUAY NGƯỜI', run: ()=>turnAction(myToken) },
    { test:/ngoi/, label:'NGỒI XUỐNG', mode:'NGỒI', run: ()=>sitAction(myToken) },
    { test:/dung day|dung len|^dung$/, label:'ĐỨNG DẬY', mode:'ĐỨNG', run: ()=>standAction(myToken) },
    { test:/gio tay|gio hai tay|dua tay len/, label:'GIƠ TAY', mode:'GIƠ TAY', run: ()=>raiseArmsAction(myToken) },
    { test:/dung lai|stop|khan cap/, label:'DỪNG LẠI', mode:'CHỜ LỆNH', run: ()=>stopAction(myToken) },
  ];

  const rule = rules.find(r=>r.test.test(s));
  if(!rule){
    log('[' + ts() + '] Không nhận diện được lệnh: "' + original + '"', 't-err');
    return;
  }
  setMode(rule.mode);
  log('[' + ts() + '] Đang thực hiện: ' + rule.label + ' ...', 't-sys');
  const ok = await rule.run();
  if(ok){
    log('[' + ts() + '] Hoàn tất: ' + rule.label + '.', 't-ok');
    if(rule.label !== 'DỪNG LẠI') setMode('CHỜ LỆNH');
  }
}

/* ---------- UI WIRING ---------- */
const cmdInput = document.getElementById('cmdInput');
const sendBtn = document.getElementById('sendBtn');
sendBtn.addEventListener('click', ()=>{
  const v = cmdInput.value; cmdInput.value=''; processCommand(v);
});
cmdInput.addEventListener('keydown', e=>{
  if(e.key === 'Enter'){ const v = cmdInput.value; cmdInput.value=''; processCommand(v); }
});
document.querySelectorAll('.qbtn').forEach(btn=>{
  btn.addEventListener('click', ()=> processCommand(btn.dataset.cmd));
});

/* ---------- VOICE CONTROL ---------- */
const micBtn = document.getElementById('micBtn');
const speechNote = document.getElementById('speechNote');
const SpeechRecognitionImpl = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizing = false;
let recognizer = null;

if(SpeechRecognitionImpl){
  recognizer = new SpeechRecognitionImpl();
  recognizer.lang = 'vi-VN';
  recognizer.continuous = false;
  recognizer.interimResults = false;

  recognizer.onstart = ()=>{ recognizing = true; micBtn.classList.add('listening'); log('[' + ts() + '] Đang nghe...', 't-sys'); };
  recognizer.onend = ()=>{ recognizing = false; micBtn.classList.remove('listening'); };
  recognizer.onerror = (e)=>{ recognizing = false; micBtn.classList.remove('listening'); log('[' + ts() + '] Lỗi nhận diện giọng nói: ' + e.error, 't-err'); };
  recognizer.onresult = (e)=>{
    const transcript = e.results[0][0].transcript;
    processCommand(transcript);
  };

  micBtn.addEventListener('click', ()=>{
    if(recognizing){ recognizer.stop(); return; }
    try{ recognizer.start(); } catch(err){ /* already started */ }
  });
} else {
  micBtn.disabled = true;
  micBtn.style.opacity = 0.4;
  speechNote.textContent = 'Trình duyệt này không hỗ trợ nhận diện giọng nói (thử Chrome trên máy tính).';
}

/* ---------- CLOCK ---------- */
const clockReadout = document.getElementById('clockReadout');
setInterval(()=>{ clockReadout.textContent = ts(); }, 1000);
clockReadout.textContent = ts();
</script>
