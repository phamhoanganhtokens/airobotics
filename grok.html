<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Điều Khiển Robot - Voice & Typing</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background: #111; color: #0f0; }
        #container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #ui {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; width: 320px;
            border: 1px solid #0f0;
        }
        #log { 
            height: 200px; overflow-y: auto; background: #000; padding: 10px; margin-top: 10px; font-size: 14px; 
        }
        input, button {
            padding: 10px; margin: 5px 0; width: 100%; background: #222; color: #0f0; border: 1px solid #0f0; border-radius: 4px;
        }
        button { cursor: pointer; }
        button:hover { background: #0f0; color: #000; }
        #mic { font-size: 24px; }
        .title { font-size: 20px; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div id="ui">
        <div class="title">🚀 PHÒNG ĐIỀU KHIỂN ROBOT</div>
        <input type="text" id="commandInput" placeholder="Nhập lệnh (ví dụ: đi tới, nhảy, nhào lộn)...">
        <button onclick="sendCommand()">Gửi Lệnh</button>
        <button id="mic" onclick="startVoice()">🎤 Nói Lệnh</button>
        
        <div style="margin-top:15px;">
            <strong>Trạng thái Robot:</strong><br>
            <span id="status">Sẵn sàng</span>
        </div>
        
        <div id="log">Log:<br></div>
    </div>

    <script>
        // === THREE.JS SETUP ===
        let scene, camera, renderer, controls;
        let robot = {};
        let isJumping = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x112233);
            scene.fog = new THREE.Fog(0x112233, 10, 50);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 3, 0);

            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // Floor (phòng điều khiển)
            const floorGeo = new THREE.PlaneGeometry(30, 30);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x334455 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Tạo Robot Humanoid đơn giản (có khớp)
            createRobot();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createRobot() {
            robot.group = new THREE.Group();
            scene.add(robot.group);

            // Torso
            const torsoGeo = new THREE.BoxGeometry(2, 3, 1);
            const material = new THREE.MeshStandardMaterial({ color: 0x00aaff, metalness: 0.6 });
            robot.torso = new THREE.Mesh(torsoGeo, material);
            robot.torso.position.y = 4;
            robot.torso.castShadow = true;
            robot.group.add(robot.torso);

            // Head
            const headGeo = new THREE.SphereGeometry(1.2, 32, 32);
            robot.head = new THREE.Mesh(headGeo, material);
            robot.head.position.y = 6.5;
            robot.group.add(robot.head);

            // Arms
            robot.leftArm = createLimb(0.6, 2.5, -2, 4, Math.PI / 4);
            robot.rightArm = createLimb(0.6, 2.5, 2, 4, -Math.PI / 4);

            // Legs
            robot.leftLeg = createLimb(0.7, 3, -0.8, 2, 0);
            robot.rightLeg = createLimb(0.7, 3, 0.8, 2, 0);

            robot.group.position.y = 0.1;
        }

        function createLimb(radius, height, x, y, rot) {
            const geo = new THREE.CylinderGeometry(radius, radius, height, 32);
            const mat = new THREE.MeshStandardMaterial({ color: 0x00aaff, metalness: 0.6 });
            const limb = new THREE.Mesh(geo, mat);
            limb.position.set(x, y, 0);
            limb.rotation.z = rot;
            limb.castShadow = true;
            robot.group.add(limb);
            return limb;
        }

        // === ANIMATION FUNCTIONS ===
        function walkForward() {
            log("🤖 Robot đang đi tới...");
            robot.group.position.z -= 0.5;
            animateLegs();
        }

        function walkBackward() {
            log("🤖 Robot đang đi lui...");
            robot.group.position.z += 0.5;
            animateLegs();
        }

        function jump() {
            if (isJumping) return;
            isJumping = true;
            log("🤖 Robot nhảy!");

            let height = 0;
            const jumpInterval = setInterval(() => {
                height += 0.4;
                robot.group.position.y = 0.1 + Math.sin(height) * 4;
                if (height > Math.PI) {
                    clearInterval(jumpInterval);
                    robot.group.position.y = 0.1;
                    isJumping = false;
                }
            }, 30);
        }

        function somersault() {
            log("🤖 Robot nhào lộn!");
            let rot = 0;
            const interval = setInterval(() => {
                rot += 0.2;
                robot.group.rotation.x = rot;
                if (rot > Math.PI * 2) {
                    clearInterval(interval);
                    robot.group.rotation.x = 0;
                }
            }, 20);
        }

        function animateLegs() {
            // Animation đơn giản cho chân
            robot.leftLeg.rotation.z = Math.sin(Date.now() / 100) * 0.5;
            robot.rightLeg.rotation.z = -Math.sin(Date.now() / 100) * 0.5;
            setTimeout(() => {
                robot.leftLeg.rotation.z = 0;
                robot.rightLeg.rotation.z = 0;
            }, 600);
        }

        function wave() {
            log("🤖 Robot vẫy tay!");
            let angle = 0;
            const interval = setInterval(() => {
                angle += 0.3;
                robot.leftArm.rotation.z = Math.sin(angle) * 1.5;
                if (angle > Math.PI * 3) {
                    clearInterval(interval);
                    robot.leftArm.rotation.z = Math.PI / 4;
                }
            }, 30);
        }

        // === COMMAND SYSTEM ===
        function sendCommand() {
            const input = document.getElementById('commandInput');
            processCommand(input.value.trim().toLowerCase());
            input.value = '';
        }

        function processCommand(cmd) {
            if (!cmd) return;
            log(`📝 Lệnh: ${cmd}`);

            if (cmd.includes("đi tới") || cmd.includes("forward") || cmd.includes("tiến")) {
                walkForward();
            } else if (cmd.includes("đi lui") || cmd.includes("back")) {
                walkBackward();
            } else if (cmd.includes("nhảy") || cmd.includes("jump")) {
                jump();
            } else if (cmd.includes("nhào lộn") || cmd.includes("somersault") || cmd.includes("flip")) {
                somersault();
            } else if (cmd.includes("vẫy tay") || cmd.includes("wave")) {
                wave();
            } else if (cmd.includes("dance") || cmd.includes("vận động")) {
                log("🤖 Robot nhảy múa!");
                somersault();
                setTimeout(wave, 800);
            } else {
                log("❓ Không hiểu lệnh. Thử: đi tới, nhảy, nhào lộn...");
            }
        }

        // === VOICE RECOGNITION ===
        let recognition;
        function startVoice() {
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
                alert("Trình duyệt không hỗ trợ nhận diện giọng nói!");
                return;
            }

            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'vi-VN';
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('commandInput').value = transcript;
                processCommand(transcript.toLowerCase());
            };

            recognition.onerror = (e) => log("❌ Lỗi voice: " + e.error);
            recognition.start();
            log("🎤 Đang nghe...");
        }

        function log(text) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += text + "<br>";
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Khởi chạy
        window.onload = init;
    </script>
</body>
</html>
