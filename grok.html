<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phòng điều khiển robot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <!-- Three.js + GLTFLoader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.min.js"></script>

  <style>
    body { background: #050505; font-family: system-ui; }
    .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); }
    .holo-frame { box-shadow: 0 0 60px rgba(34, 211, 238, 0.6); }
    #hologram { width: 100%; height: 560px; border-radius: 24px; overflow: hidden; }
  </style>
</head>
<body class="min-h-screen text-cyan-300">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-5xl font-bold text-center mb-8 tracking-widest text-cyan-400">
      RX-07 • GROK
    </h1>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <!-- 3D GLTF Hologram -->
      <div class="lg:col-span-7 glass rounded-3xl p-4 holo-frame">
        <div id="hologram"></div>
        <div class="text-center text-xs mt-2 opacity-70">
          GLTF Model • Kéo chuột xoay • Cuộn chuột zoom
        </div>
      </div>

      <!-- Control Panel -->
      <div class="lg:col-span-5 space-y-6">
        <div class="glass rounded-3xl p-6">
          <h3 class="text-xl font-bold mb-4">SYSTEM STATUS</h3>
          <div class="grid grid-cols-2 gap-4 text-sm">
            <div>Battery: <span id="battery" class="text-emerald-400 font-mono">97%</span></div>
            <div>Temp: <span id="temp" class="text-emerald-400 font-mono">36.3°C</span></div>
            <div>Mode: <span class="text-cyan-400">ACTIVE</span></div>
            <div>Stability: <span class="text-emerald-400">99.7%</span></div>
          </div>
        </div>

        <div class="glass rounded-3xl p-6">
          <button onclick="startVoice()" 
                  class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 py-6 rounded-2xl text-xl font-semibold flex items-center justify-center gap-3">
            <i class="fa-solid fa-microphone fa-xl"></i> NÓI LỆNH
          </button>

          <input type="text" id="cmdInput" placeholder="Nhập lệnh (tiến, nhảy, vẫy tay...)" 
                 class="mt-4 w-full bg-zinc-900 border border-cyan-500/50 rounded-2xl px-6 py-4 text-lg"
                 onkeypress="if(event.key==='Enter') executeCommand()">
        </div>

        <div class="glass rounded-3xl p-6">
          <h3 class="font-bold mb-4">QUICK COMMANDS</h3>
          <div class="grid grid-cols-3 gap-3">
            <button onclick="executeCommand('tiến')" class="quick-btn">➡️ Tiến</button>
            <button onclick="executeCommand('lùi')" class="quick-btn">⬅️ Lùi</button>
            <button onclick="executeCommand('nhảy')" class="quick-btn">⤴ Nhảy</button>
            <button onclick="executeCommand('vẫy tay')" class="quick-btn">👋 Vẫy</button>
            <button onclick="executeCommand('quay')" class="quick-btn">🔄 Quay</button>
            <button onclick="executeCommand('dance')" class="quick-btn">🕺 Dance</button>
          </div>
          <button onclick="emergencyStop()" class="mt-6 w-full bg-red-600 hover:bg-red-700 py-4 rounded-2xl text-lg font-bold">
            ⏹ DỪNG KHẨN CẤP
          </button>
        </div>
      </div>
    </div>

    <!-- Log -->
    <div class="mt-6 glass rounded-3xl p-6">
      <div class="flex justify-between mb-3">
        <h3 class="font-bold">COMMAND LOG</h3>
        <button onclick="clearLog()" class="text-red-400 text-sm">XÓA</button>
      </div>
      <div id="log" class="h-64 overflow-y-auto font-mono text-sm space-y-1"></div>
    </div>
  </div>

  <script>
    let scene, camera, renderer, robot, mixer;
    let animations = {};

    function initThree() {
      const container = document.getElementById('hologram');
      
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(50, container.clientWidth / 560, 0.1, 1000);
      camera.position.set(0, 1.5, 5);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(container.clientWidth, 560);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);

      // Lights
      scene.add(new THREE.AmbientLight(0xaaaaaa, 0.8));
      const hemiLight = new THREE.HemisphereLight(0x00ffff, 0x112233, 1.2);
      scene.add(hemiLight);

      // Load GLTF Robot
      const loader = new THREE.GLTFLoader();
      loader.load(
        'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
        (gltf) => {
          robot = gltf.scene;
          robot.scale.set(1.8, 1.8, 1.8);
          robot.position.y = -1.2;
          scene.add(robot);

          // Animation Mixer
          mixer = new THREE.AnimationMixer(robot);
          gltf.animations.forEach((clip) => {
            animations[clip.name] = clip;
          });
          log("✅ GLTF Robot loaded successfully!", "text-emerald-400");
        },
        undefined,
        (error) => {
          console.error(error);
          log("⚠️ Không tải được mô hình GLTF", "text-red-400");
        }
      );

      function animate() {
        requestAnimationFrame(animate);
        if (mixer) mixer.update(0.016);
        if (robot) robot.rotation.y += 0.0015; // Slow idle rotation
        renderer.render(scene, camera);
      }
      animate();
    }

    // Mouse controls
    let isDragging = false, prevX = 0;
    function addMouseControls() {
      const container = document.getElementById('hologram');
      container.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; });
      window.addEventListener('mouseup', () => isDragging = false);
      window.addEventListener('mousemove', e => {
        if (!isDragging || !robot) return;
        robot.rotation.y += (e.clientX - prevX) * 0.005;
        prevX = e.clientX;
      });
      container.addEventListener('wheel', e => {
        if (!camera) return;
        camera.position.z += e.deltaY * 0.015;
        camera.position.z = Math.max(2, Math.min(10, camera.position.z));
      });
    }

    // Command Logic
    function log(msg, color = "text-cyan-300") {
      const el = document.getElementById('log');
      const time = new Date().toLocaleTimeString('vi-VN');
      el.innerHTML += `<div class="${color}">[${time}] ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    function playAnimation(name, duration = 1500) {
      if (!mixer || !animations[name]) return;
      const action = mixer.clipAction(animations[name]);
      action.reset().play();
      setTimeout(() => action.stop(), duration);
    }

    function executeCommand(cmd = null) {
      const input = document.getElementById('cmdInput');
      const text = (cmd || input.value || "").toLowerCase().trim();
      if (!text) return;

      log(`📡 LỆNH: ${text}`, "text-emerald-400");

      if (text.includes("nhảy") || text.includes("jump")) {
        log("⤴ Robot nhảy", "text-cyan-400");
        if (robot) robot.position.y = 1.5;
        setTimeout(() => { if(robot) robot.position.y = -1.2; }, 800);
        playAnimation("Jump", 1000);
      } 
      else if (text.includes("vẫy") || text.includes("wave")) {
        log("👋 Robot vẫy tay", "text-cyan-400");
        playAnimation("Wave", 1200);
      } 
      else if (text.includes("dance")) {
        log("🕺 Robot nhảy múa", "text-cyan-400");
        playAnimation("Dance", 3000);
      } 
      else if (text.includes("tiến") || text.includes("walk")) {
        log("🚶 Robot tiến tới", "text-cyan-400");
        if (robot) robot.position.z = -1;
        setTimeout(() => { if(robot) robot.position.z = 0; }, 1000);
      } 
      else if (text.includes("quay") || text.includes("spin")) {
        log("🔄 Robot quay", "text-cyan-400");
        if (robot) robot.rotation.y += Math.PI * 2;
      } 
      else {
        log("⚠️ Lệnh chưa được hỗ trợ", "text-amber-400");
      }

      if (!cmd) input.value = '';
    }

    function startVoice() {
      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Speech) return alert("Voice không hỗ trợ");
      const rec = new Speech();
      rec.lang = 'vi-VN';
      rec.onresult = e => {
        const text = e.results[0][0].transcript;
        log(`🎤 ${text}`);
        executeCommand(text);
      };
      rec.start();
    }

    function emergencyStop() {
      log("⛔ DỪNG KHẨN CẤP!", "text-red-500");
      if (mixer) mixer.stopAllAction();
      alert("🚨 ROBOT ĐÃ DỪNG KHẨN CẤP");
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    // Init
    window.onload = () => {
      initThree();
      addMouseControls();
      log("🌌 RX-07 CLAUDE GLTF HOLOGRAM READY", "text-emerald-400");
    };
  </script>
</body>
</html>
