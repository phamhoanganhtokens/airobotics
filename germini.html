<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Robotics | HR-Alpha-01 Control System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#05050a',
                        neonCyan: '#00f0ff',
                        neonBlue: '#00b8ff',
                        neonMagenta: '#ff00aa',
                        accentGold: '#ffd700',
                        success: '#00ff9d',
                        danger: '#ff3366'
                    },
                    fontFamily: {
                        serif: ['"Times New Roman"', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');
        body { background-color: #05050a; color: #e2e8f0; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scanline { position: absolute; width: 100%; height: 2px; background: rgba(0, 240, 255, 0.3); animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        .neon-glow { text-shadow: 0 0 10px #00f0ff; }
        .emergency-active { filter: grayscale(1) brightness(0.5); pointer-events: none; }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen">

    <!-- Header -->
    <header class="flex justify-between items-center mb-6 glass p-4 rounded-lg">
        <div>
            <h1 class="text-2xl font-bold text-neonCyan tracking-widest uppercase">AI Robotics Control</h1>
            <p class="text-xs text-gray-400">ID: HR-ALPHA-01 | VER: 2.4.1</p>
        </div>
        <div id="clock" class="text-xl font-mono text-accentGold border-l-2 border-accentGold pl-4">00:00:00</div>
    </header>

    <!-- Main Grid -->
    <main class="grid grid-cols-1 lg:grid-cols-12 gap-6" id="dashboard">
        
        <!-- Left Sidebar -->
        <section class="lg:col-span-3 space-y-4">
            <div class="glass p-6 rounded-xl">
                <h2 class="text-lg font-serif mb-4 text-neonCyan">Bảng Điều Khiển</h2>
                <div class="grid grid-cols-2 gap-2">
                    <button class="bg-gray-800 hover:bg-neonCyan hover:text-black transition p-2 rounded text-xs uppercase">Đi bộ</button>
                    <button class="bg-gray-800 hover:bg-neonCyan hover:text-black transition p-2 rounded text-xs uppercase">Chạy</button>
                    <button class="bg-gray-800 hover:bg-neonCyan hover:text-black transition p-2 rounded text-xs uppercase">Xoay</button>
                    <button class="bg-gray-800 hover:bg-neonCyan hover:text-black transition p-2 rounded text-xs uppercase">Cúi</button>
                    <button class="bg-gray-800 hover:bg-neonCyan hover:text-black transition p-2 rounded text-xs uppercase">Nhảy</button>
                    <button class="bg-gray-800 hover:bg-neonCyan hover:text-black transition p-2 rounded text-xs uppercase">Cân Bằng</button>
                </div>
                <button id="emergency-btn" class="w-full mt-6 bg-danger text-white py-3 rounded font-bold hover:bg-red-700 transition">STOP KHẨN CẤP</button>
            </div>
        </section>

        <!-- Main Viewport -->
        <section class="lg:col-span-6 glass rounded-xl relative overflow-hidden flex flex-col items-center justify-center min-h-[400px]">
            <div class="scanline"></div>
            <div class="text-center">
                <div class="w-48 h-48 border-2 border-neonCyan rounded-full flex items-center justify-center animate-pulse">
                    <span class="text-neonCyan text-6xl">🤖</span>
                </div>
                <p class="mt-4 text-neonBlue font-mono uppercase">Hệ thống đang hoạt động ổn định</p>
            </div>
            <div class="absolute bottom-4 left-4 right-4 grid grid-cols-4 gap-2">
                <div class="h-16 bg-black/50 border border-neonBlue rounded flex items-center justify-center text-[10px]">MAIN</div>
                <div class="h-16 bg-black/50 border border-neonBlue rounded flex items-center justify-center text-[10px]">FLIR</div>
                <div class="h-16 bg-black/50 border border-neonBlue rounded flex items-center justify-center text-[10px]">DEPTH</div>
                <div class="h-16 bg-black/50 border border-neonBlue rounded flex items-center justify-center text-[10px]">ULTRA</div>
            </div>
        </section>

        <!-- Right Sidebar -->
        <section class="lg:col-span-3 space-y-4">
            <div class="glass p-6 rounded-xl">
                <h2 class="text-lg font-serif mb-4 text-neonMagenta">Chỉ Số Sinh Tồn</h2>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-xs mb-1"><span>Pin</span><span id="batt-val">82%</span></div>
                        <div class="w-full h-2 bg-gray-800 rounded-full"><div id="batt-bar" class="h-full bg-success rounded-full w-[82%]"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-xs mb-1"><span>Nhiệt độ</span><span>36.2°C</span></div>
                        <div class="w-full h-2 bg-gray-800 rounded-full"><div class="h-full bg-accentGold rounded-full w-[45%]"></div></div>
                    </div>
                    <canvas id="stabilityChart" height="150"></canvas>
                </div>
            </div>
        </section>

        <!-- Bottom Panel -->
        <section class="lg:col-span-12 grid grid-cols-1 md:grid-cols-2 gap-6 h-auto">
            <div class="glass p-6 rounded-xl overflow-y-auto max-h-[200px]">
                <h3 class="text-sm font-bold uppercase mb-2 text-gray-400">Nhật ký hệ thống</h3>
                <div id="log" class="text-xs font-mono space-y-1">
                    <p class="text-success">[00:00] Khởi động hệ thống lõi...</p>
                    <p class="text-success">[00:01] Cảm biến ổn định ở mức 98%...</p>
                </div>
            </div>
            <div class="glass p-6 rounded-xl">
                <canvas id="resourceChart" height="100"></canvas>
            </div>
        </section>
    </main>

    <script>
        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Emergency Stop
        document.getElementById('emergency-btn').addEventListener('click', () => {
            if(confirm("Xác nhận kích hoạt Emergency Stop? Hệ thống sẽ bị vô hiệu hóa.")) {
                document.getElementById('dashboard').classList.add('emergency-active');
            }
        });

        // Charts
        const ctx = document.getElementById('stabilityChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: { labels: ['A','B','C','D','E'], datasets: [{ data: [98, 97, 99, 96, 98], borderColor: '#00f0ff', fill: false }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
        });

        const ctx2 = document.getElementById('resourceChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: { labels: ['CPU', 'GPU', 'NPU', 'MEM'], datasets: [{ data: [45, 78, 92, 60], backgroundColor: '#ff00aa' }] },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        // Dynamic Log
        setInterval(() => {
            const log = document.getElementById('log');
            const msg = document.createElement('p');
            msg.className = "text-gray-300";
            msg.innerText = `[${new Date().toLocaleTimeString().slice(3)}] Đang hiệu chỉnh mô-men xoắn khớp...`;
            log.prepend(msg);
        }, 3000);
    </script>
</body>
</html>
